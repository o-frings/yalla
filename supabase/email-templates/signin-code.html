<!DOCTYPE html>
<html>
  <body style="margin:0; padding:0; background:#f2f2f7; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f2f2f7; padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:420px; background:#ffffff; border-radius:22px; overflow:hidden; box-shadow:0 2px 14px rgba(0,0,0,0.07);">

            <!-- brand (image with branded fallback if it's blocked) -->
            <tr>
              <td style="padding:36px 32px 8px;">
                <table role="presentation" cellpadding="0" cellspacing="0">
                  <tr>
                    <td width="40" height="40" style="width:40px; height:40px; background:#e8551c; border-radius:11px; text-align:center; vertical-align:middle;">
                      <img src="https://o-frings.github.io/yalla/icon-email.png" width="40" height="40" alt="Yalla" style="display:block; width:40px; height:40px; border-radius:11px;">
                    </td>
                    <td style="padding-left:12px; vertical-align:middle; font-weight:700; font-size:18px; color:#1a1a1a;">Yalla</td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- heading -->
            <tr>
              <td style="padding:20px 32px 0;">
                <h1 style="margin:0; font-size:22px; font-weight:700; color:#111827;">Your sign-in code</h1>
                <p style="margin:8px 0 0; font-size:15px; line-height:1.5; color:#6b7280;">Enter this 6-digit code in the app to continue.</p>
              </td>
            </tr>

            <!-- code -->
            <tr>
              <td style="padding:24px 32px 8px;">
                <div style="background:#fff6f1; border:1px solid #fbd9c8; border-radius:14px; padding:20px; text-align:center; font-size:34px; font-weight:800; letter-spacing:10px; color:#e8551c;">{{ .Token }}</div>
              </td>
            </tr>

            <!-- footnote -->
            <tr>
              <td style="padding:16px 32px 36px;">
                <p style="margin:0; font-size:13px; line-height:1.5; color:#9ca3af;">This code expires shortly and can only be used once. If you didn't request it, you can safely ignore this email.</p>
              </td>
            </tr>

          </table>

          <p style="margin:20px 0 0; font-size:12px; color:#b0b0b5;">Yalla &middot; train with friends</p>
        </td>
      </tr>
    </table>
  </body>
</html>
